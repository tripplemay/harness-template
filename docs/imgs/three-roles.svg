<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="system-ui, -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="70" font-size="34" font-weight="700" fill="#0F172A" text-anchor="middle">三角色协作全景</text>
  <text x="600" y="104" font-size="15" fill="#64748B" text-anchor="middle">Triad Workflow · 无人评估自己的工作</text>

  <!-- Triangle guide (subtle dashed) -->
  <path d="M 600 265 L 265 620 L 935 620 Z" stroke="#E2E8F0" stroke-width="1.5" fill="none" stroke-dasharray="5,7" opacity="0.75"/>

  <!-- Planner card -->
  <g filter="url(#cardShadow)">
    <rect x="490" y="190" width="220" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="490" y="190" width="5" height="150" fill="#3B82F6"/>
  </g>
  <text x="514" y="224" font-size="19" font-weight="700" fill="#3B82F6">Planner</text>
  <text x="514" y="244" font-size="12" fill="#94A3B8">Claude CLI · 规划员</text>
  <line x1="514" y1="258" x2="690" y2="258" stroke="#E2E8F0" stroke-width="1"/>
  <text x="514" y="283" font-size="12" fill="#475569">· 拆解需求 + 写规格</text>
  <text x="514" y="303" font-size="12" fill="#475569">· 定义 acceptance 标准</text>
  <text x="514" y="323" font-size="12" fill="#475569">· 排布批次 + 分配角色</text>

  <!-- Generator card -->
  <g filter="url(#cardShadow)">
    <rect x="150" y="545" width="220" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="150" y="545" width="5" height="150" fill="#10B981"/>
  </g>
  <text x="174" y="579" font-size="19" font-weight="700" fill="#10B981">Generator</text>
  <text x="174" y="599" font-size="12" fill="#94A3B8">Claude CLI · 实现员</text>
  <line x1="174" y1="613" x2="350" y2="613" stroke="#E2E8F0" stroke-width="1"/>
  <text x="174" y="638" font-size="12" fill="#475569">· 实现功能代码</text>
  <text x="174" y="658" font-size="12" fill="#475569">· 每次 push 检查 CI</text>
  <text x="174" y="678" font-size="12" fill="#475569">· 不写测试、不自评</text>

  <!-- Evaluator card -->
  <g filter="url(#cardShadow)">
    <rect x="830" y="545" width="220" height="150" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="830" y="545" width="5" height="150" fill="#EF4444"/>
  </g>
  <text x="854" y="579" font-size="19" font-weight="700" fill="#EF4444">Evaluator</text>
  <text x="854" y="599" font-size="12" fill="#94A3B8">Codex · 验收员</text>
  <line x1="854" y1="613" x2="1030" y2="613" stroke="#E2E8F0" stroke-width="1"/>
  <text x="854" y="638" font-size="12" fill="#475569">· 设计 + 执行测试</text>
  <text x="854" y="658" font-size="12" fill="#475569">· 独立 PASS/FAIL 验收</text>
  <text x="854" y="678" font-size="12" fill="#475569">· 不修改产品代码</text>

  <!-- Arrow: Planner → Generator -->
  <path d="M 510 340 Q 400 450 290 550" stroke="#3B82F6" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)" opacity="0.85"/>
  <g transform="translate(333, 440)">
    <rect x="-48" y="-14" width="96" height="40" rx="6" fill="#FAFAFA" opacity="0.95"/>
    <text x="0" y="2" font-size="13" font-weight="600" fill="#3B82F6" text-anchor="middle">规格</text>
    <text x="0" y="18" font-size="11" fill="#64748B" text-anchor="middle">+ features.json</text>
  </g>

  <!-- Arrow: Generator → Evaluator -->
  <path d="M 370 620 L 820 620" stroke="#10B981" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)" opacity="0.85"/>
  <g transform="translate(600, 620)">
    <rect x="-75" y="-14" width="150" height="24" rx="6" fill="#FAFAFA" opacity="0.95"/>
    <text x="0" y="3" font-size="13" font-weight="600" fill="#10B981" text-anchor="middle">代码 → verifying</text>
  </g>

  <!-- Arrow: Evaluator → Planner (全 PASS) -->
  <path d="M 910 550 Q 800 450 690 340" stroke="#EF4444" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)" opacity="0.85"/>
  <g transform="translate(863, 440)">
    <rect x="-40" y="-14" width="80" height="40" rx="6" fill="#FAFAFA" opacity="0.95"/>
    <text x="0" y="2" font-size="13" font-weight="600" fill="#EF4444" text-anchor="middle">全 PASS</text>
    <text x="0" y="18" font-size="11" fill="#64748B" text-anchor="middle">→ done</text>
  </g>

  <!-- Feedback arrow: Evaluator → Generator (dashed) -->
  <path d="M 825 590 Q 600 510 375 590" stroke="#94A3B8" stroke-width="2" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowSlate)"/>
  <g transform="translate(600, 510)">
    <rect x="-95" y="-14" width="190" height="24" rx="6" fill="#FAFAFA" opacity="0.95"/>
    <text x="0" y="3" font-size="12" fill="#64748B" text-anchor="middle">有 FAIL/PARTIAL → fixing</text>
  </g>

  <!-- Bottom insight banner -->
  <rect x="260" y="728" width="680" height="44" rx="22" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="756" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">无人评估自己的工作  ·  通过 progress.json 异步交接</text>
</svg>
