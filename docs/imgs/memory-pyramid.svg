<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="system-ui, -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="pyShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#94A3B8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="600" y="60" font-size="32" font-weight="700" fill="#0F172A" text-anchor="middle">记忆分层金字塔</text>
  <text x="600" y="94" font-size="14" fill="#64748B" text-anchor="middle">T0 / T1 / T2 分层加载 · 每条信息只存一处 · 启动加载量 ≤ 120 行</text>

  <!-- Column headers -->
  <text x="140" y="150" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="2">加载时机</text>
  <text x="1060" y="150" font-size="13" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="2">写入职责</text>

  <!-- ============ Pyramid ============ -->

  <!-- T0 layer (base, largest, warm amber) -->
  <g filter="url(#pyShadow)">
    <polygon points="380,450 820,450 940,620 260,620" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  </g>
  <text x="600" y="487" font-size="19" font-weight="700" fill="#92400E" text-anchor="middle">T0 · 每次启动必读</text>
  <text x="600" y="519" font-size="13" font-weight="500" fill="#78350F" text-anchor="middle">MEMORY.md（索引）</text>
  <text x="600" y="543" font-size="13" font-weight="500" fill="#78350F" text-anchor="middle">project-status.md（≤30 行 · 覆盖写）</text>
  <text x="600" y="567" font-size="13" font-weight="500" fill="#78350F" text-anchor="middle">environment.md（≤30 行）</text>
  <text x="600" y="603" font-size="11" fill="#B45309" text-anchor="middle" font-style="italic">最稳定  ·  最重要  ·  最小</text>

  <!-- T1 layer (middle, green) -->
  <g filter="url(#pyShadow)">
    <polygon points="500,290 700,290 820,450 380,450" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  </g>
  <text x="600" y="327" font-size="17" font-weight="700" fill="#166534" text-anchor="middle">T1 · 按角色加载</text>
  <text x="600" y="359" font-size="12" font-weight="500" fill="#14532D" text-anchor="middle">role-context/planner.md</text>
  <text x="600" y="381" font-size="12" font-weight="500" fill="#14532D" text-anchor="middle">role-context/generator.md</text>
  <text x="600" y="403" font-size="12" font-weight="500" fill="#14532D" text-anchor="middle">role-context/evaluator.md</text>
  <text x="600" y="430" font-size="11" fill="#15803D" text-anchor="middle" font-style="italic">≤ 50 行/文件</text>

  <!-- T2 layer (top, blue, smallest) -->
  <g filter="url(#pyShadow)">
    <polygon points="600,170 700,290 500,290" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <text x="600" y="225" font-size="15" font-weight="700" fill="#1E40AF" text-anchor="middle">T2 · 按需加载</text>
  <text x="600" y="250" font-size="11" fill="#1E40AF" text-anchor="middle">user-role.md</text>
  <text x="600" y="267" font-size="11" fill="#1E40AF" text-anchor="middle">reference-*.md</text>
  <text x="600" y="282" font-size="11" fill="#1E40AF" text-anchor="middle">feedback-*.md</text>

  <!-- ============ Left labels (加载时机) ============ -->

  <!-- T2 left label -->
  <g>
    <rect x="20" y="215" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="1.5"/>
    <text x="120" y="240" font-size="13" font-weight="600" fill="#1E40AF" text-anchor="middle">触发条件命中时</text>
    <text x="120" y="260" font-size="11" fill="#64748B" text-anchor="middle">MEMORY.md 索引标注</text>
  </g>
  <line x1="220" y1="244" x2="500" y2="244" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- T1 left label -->
  <g>
    <rect x="20" y="350" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#DCFCE7" stroke-width="1.5"/>
    <text x="120" y="375" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">按当前角色加载</text>
    <text x="120" y="395" font-size="11" fill="#64748B" text-anchor="middle">确定角色后读对应文件</text>
  </g>
  <line x1="220" y1="379" x2="430" y2="379" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- T0 left label -->
  <g>
    <rect x="20" y="510" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#FEF3C7" stroke-width="1.5"/>
    <text x="120" y="535" font-size="13" font-weight="600" fill="#92400E" text-anchor="middle">每次启动必读</text>
    <text x="120" y="555" font-size="11" fill="#64748B" text-anchor="middle">无条件加载</text>
  </g>
  <line x1="220" y1="539" x2="330" y2="539" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============ Right labels (写入职责) ============ -->

  <!-- T2 right label -->
  <g>
    <rect x="980" y="215" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#DBEAFE" stroke-width="1.5"/>
    <text x="1080" y="240" font-size="13" font-weight="600" fill="#1E40AF" text-anchor="middle">各角色可写</text>
    <text x="1080" y="260" font-size="11" fill="#64748B" text-anchor="middle">谁发现谁写</text>
  </g>
  <line x1="700" y1="244" x2="980" y2="244" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- T1 right label -->
  <g>
    <rect x="980" y="350" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#DCFCE7" stroke-width="1.5"/>
    <text x="1080" y="375" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">Planner 统一维护</text>
    <text x="1080" y="395" font-size="11" fill="#64748B" text-anchor="middle">行为规范归一写入</text>
  </g>
  <line x1="770" y1="379" x2="980" y2="379" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- T0 right label -->
  <g>
    <rect x="980" y="510" width="200" height="58" rx="10" fill="#FFFFFF" stroke="#FEF3C7" stroke-width="1.5"/>
    <text x="1080" y="535" font-size="13" font-weight="600" fill="#92400E" text-anchor="middle">谁产生变更谁更新</text>
    <text x="1080" y="555" font-size="11" fill="#64748B" text-anchor="middle">覆盖写 · 不追加</text>
  </g>
  <line x1="880" y1="539" x2="980" y2="539" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============ Bottom insight ============ -->

  <rect x="220" y="670" width="760" height="88" rx="12" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="697" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">内容边界铁律</text>
  <text x="600" y="721" font-size="12" fill="#334155" text-anchor="middle">project-status.md = <tspan font-weight="700" fill="#92400E">WHAT</tspan>（会变的事实）  ·  role-context/*.md = <tspan font-weight="700" fill="#166534">HOW</tspan>（不常变的规范）</text>
  <text x="600" y="743" font-size="12" fill="#334155" text-anchor="middle">每条信息只存一处  ·  不重复 progress.json 已有的结构化数据</text>
</svg>
